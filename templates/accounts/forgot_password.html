{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Sunny Side Burrow School</title>
    <link rel="stylesheet" href="{% static 'css/account.css' %}">
</head>
<body>
    <div class="container">
        <div class="image-section">
            <img src="{% static 'images/school_building.png' %}" alt="School Building">
        </div>

        <div class="form-section">
            <h1 class="school-name">SUNNY SIDE<br>BURROW SCHOOL</h1>
            <h2 style="color: #D32F2F; font-size: 1.2rem; text-align: center; margin-bottom: 20px; font-weight: 500;">Reset Your Password</h2>

            {% if messages %}
            {% for message in messages %}
            <div style="color: {% if message.tags == 'success' %}green{% else %}red{% endif %}; text-align: center; margin-bottom: 15px;">{{ message }}</div>
            {% endfor %}
            {% endif %}

            <form class="register-grid" style="grid-template-columns: 1fr; max-width: 400px;" method="post">
                {% csrf_token %}
                <div class="input-box">
                    <input type="email" name="email" required>
                    <label>Email</label>
                </div>

                <div class="button-container">
                    <button type="submit" class="btn-register" style="width: 100%;">SEND RESET LINK</button>
                </div>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <a href="{% url 'home' %}" style="color: #D32F2F; text-decoration: none; font-weight: bold;">← Back to Login</a>
            </div>
        </div>
    </div>
</body>
</html>
