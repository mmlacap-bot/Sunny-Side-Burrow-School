{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Details - Sunny Side Burrow School</title>
    <link rel="stylesheet" href="{% static 'css/account.css' %}">
</head>
<body>
    <div class="container">
        <div class="image-section">
            <img src="{% static 'images/school_building.png' %}" alt="School Building">
        </div>

        <div class="form-section">
            <h1 class="school-name">SUNNY SIDE<br>BURROW SCHOOL</h1>
            
            {% if error %}
            <div style="color: red; text-align: center; margin-bottom: 20px;">{{ error }} <a href="{% url 'login' %}">Log in here</a>.</div>
            {% endif %}

            <form class="register-grid" style="grid-template-columns: 1fr; max-width: 400px;" method="post">
                {% csrf_token %}
                <div class="input-box">
                    <input type="text" id="id_generated_email" name="generated_email" value="" readonly>
                    <label>Generated Email</label>
                </div>

                <div class="input-box">
                    <input type="text" id="id_student_id" name="student_id_display" value="{{ user.student_id }}" readonly>
                    <label>Student ID</label>
                </div>

                <div class="input-box">
                    <input type="password" id="id_pass1" name="password" required>
                    <label>Create Password</label>
                </div>

                <div class="input-box">
                    <input type="password" id="id_pass2" name="retype_password" required>
                    <label>Re-type Password</label>
                </div>

                <div class="button-container">
                    <a href="{% url 'home' %}" style="text-decoration: none;"></a>
                    <button type="submit" class="btn-register" style="width: 100%;">CREATE ACCOUNT</button>
                </div>
            </form>
        </div>
    </div>
    <script>
    window.onload = function() {
        
        const f = "{{ user.firstname }}".charAt(0).toUpperCase();
        const m = "{{ user.middlename }}".charAt(0).toUpperCase();
        const s = "{{ user.surname }}".trim();

        const emailField = document.getElementById('id_generated_email');
        
        if (s && f) {
            emailField.value = `${f}${m}${s}@sunny.edu.ph`;
        }
    };

    
    document.querySelector('form').onsubmit = function(e) {
        const p1 = document.getElementById('id_pass1').value;
        const p2 = document.getElementById('id_pass2').value;

        if (p1 !== p2) {
            alert("Passwords do not match! Please try again.");
            e.preventDefault();
        }
    };
</script>
</body>
</html>
